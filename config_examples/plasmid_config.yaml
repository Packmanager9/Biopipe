# ============================================================
#  plasmid_config.yaml
#  Standalone config for plasmid_design_moclo_v3.py (Phase 2 / Step 9)
#  Covers all options including advanced enzyme and overhang overrides.
# ============================================================

assembly_method: GoldenGate
moclo_standard:  marillonnet   # marillonnet | cidar | jump

output_prefix: moclo_plasmid   # stem for output .gb and .fasta files
output_dir:    ~/output/latest/moclo_plasmids

# ── Enzymes ──────────────────────────────────────────────────
enzyme_level0: BsaI-HFv2   # Level 0 — CDS domestication
enzyme_level1: BpiI         # Level 1 — part assembly

# Optional: override enzyme properties (normally auto-filled from internal table)
enzyme_props:
  BsaI-HFv2:
    recog:       GGTCTC
    cut:         "1/5"
    overhang_len: 4
    opt_temp:    50
    inact_temp:  65
    buffer:      CutSmart
  BpiI:
    recog:       GAAGAC
    cut:         "2/6"
    overhang_len: 4
    opt_temp:    37
    inact_temp:  65
    buffer:      CutSmart

# ── Genetic parts ────────────────────────────────────────────
# Values can be part names (looked up in internal library) or file paths.
promoter:   pJ23119
rbs:        RBS_B0034
terminator: rrnB_T1
ori:        pMB1_ori
marker:     KanR
# backbone: pUC19_prepared.fasta   # full backbone FASTA — overrides ori + marker

# ── Overhang table ───────────────────────────────────────────
# Optional: override the moclo_standard preset with custom fusion-site sequences.
# Each part type gets a [left_overhang, right_overhang] pair (4 bp each).
# overhang_table:
#   promoter:   [GGAG, TACT]
#   rbs:        [AATG, GCTT]
#   cds:        [AATG, GCTT]
#   terminator: [TACT, CTGC]

# ── Domestication ────────────────────────────────────────────
perform_domestication:  true
domestication_enzymes:  [BsaI, BpiI]   # internal sites to remove

# ── CDS inputs ───────────────────────────────────────────────
# Leave empty to auto-discover from proteinmpnn_out/split_seqs/ via latest/ symlink.
# Or provide explicit paths:
genes: []
# genes:
#   - proteinmpnn_out/split_seqs/design_0_seq0.fasta
#   - proteinmpnn_out/split_seqs/design_1_seq3.fasta
#   - /absolute/path/to/custom_gene.fasta

# ── Path overrides (usually not needed) ─────────────────────
# output_base: ~/output              # root of all pipeline runs (default: ~/output)
# run_dir:     ~/output/run_20260309_2353   # explicit run directory
# parts_dir:   ~/output/run_20260309_2353/proteinmpnn_out/split_seqs
